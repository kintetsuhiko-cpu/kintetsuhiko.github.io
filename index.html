<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>プロランニングコーチ 金哲彦</title>
<meta name="description" content="プロランニングコーチ 金哲彦 紹介サイト">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
.hero{background:linear-gradient(135deg,#0d6efd,#0dcaf0);color:#fff;padding:6rem 0}
.counter{font-size:2.2rem;font-weight:bold}
footer{background:#222;color:#fff}
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top"><div class="container"><a class="navbar-brand" href="#">金哲彦</a></div></nav>
<header class="hero text-center"><div class="container">
<h1 class="display-4">プロランニングコーチ 金哲彦</h1>
<p class="lead">ランニングの魅力を伝えるプロフェッショナル</p>
<a class="btn btn-light btn-lg" href="#contact">お問い合わせ</a>
</div></header>

<section class="container py-5">
<div class="row g-4 align-items-center">
<div class="col-md-4"><img src="images/kintetsuhiko2026.jpg" class="img-fluid rounded shadow" alt="金哲彦（画像は差し替えてください）"></div>
<div class="col-md-8"><h2>プロフィール</h2><p>このページは紹介用テンプレートです。プロフィールや実績は公開情報に基づいて適宜更新してください。</p></div>
</div>
</section>

<section class="bg-light py-5"><div class="container">
<div class="row text-center">
<div class="col"><div class="counter" data-target="30">0</div><div>講演実績(例)</div></div>
<div class="col"><div class="counter" data-target="100">0</div><div>イベント(例)</div></div>
<div class="col"><div class="counter" data-target="10000">0</div><div>指導人数(例)</div></div>
</div></div></section>

<section class="container py-5">
<h2>YouTube</h2>
<p><a class="btn btn-danger" target="_blank" href="https://www.youtube.com/@kintetsuhiko"><i class="bi bi-youtube"></i> 公式チャンネル</a></p>
</section>

<section class="container py-5">
<h2>SNS</h2>
<a class="btn btn-outline-danger me-2" target="_blank" href="https://www.youtube.com/@kintetsuhiko"><i class="bi bi-youtube"></i> YouTube</a>
</section>

<section id="contact" class="container py-5">
<h2>お問い合わせ</h2>
<form>
<div class="mb-3"><label class="form-label">お名前</label><input class="form-control" required></div>
<div class="mb-3"><label class="form-label">メール</label><input type="email" class="form-control" required></div>
<div class="mb-3"><label class="form-label">お問い合わせ内容</label><textarea class="form-control" rows="5" required></textarea></div>
<button class="btn btn-primary">送信</button>
</form>
</section>

<footer class="py-4 text-center"><div class="container">©2026 Sample</div></footer>
<script>
document.querySelectorAll('.counter').forEach(el=>{
let t=+el.dataset.target,c=0;
let step=Math.max(1,Math.ceil(t/100));
let i=setInterval(()=>{c+=step;if(c>=t){c=t;clearInterval(i)}el.textContent=c.toLocaleString();},20);
});
</script>
</body></html>
